<!DOCTYPE html><html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YariLiga - یاری لیگا</title>
<style>
    /* 🌈 General Styles */
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f5f5f5;
        color: #333;
    }
    header {
        background: #ff6b00;
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    header h1 {
        margin: 0;
        font-size: 1.8em;
    }
    nav a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-weight: bold;
    }
    .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 0 15px;
    }
    .league-select {
        margin-bottom: 20px;
    }
    select {
        padding: 10px;
        font-size: 1em;
    }
    .match-card {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .match-info {
        flex: 2;
    }
    .match-actions {
        flex: 1;
        text-align: left;
    }
    button {
        background: #ff6b00;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #e65c00;
    }
    /* Modal */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 90%;
        max-width: 500px;
    }
    .prediction-btn {
        display: block;
        margin: 10px 0;
        width: 100%;
        padding: 10px;
        font-size: 1em;
    }
    /* Leaderboard */
    .leaderboard {
        background: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .leaderboard h2 {
        margin-top: 0;
        color: #ff6b00;
    }
    .leaderboard ul {
        list-style: none;
        padding: 0;
    }
    .leaderboard li {
        padding: 10px 0;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
    }
    @media (max-width: 768px) {
        .match-card {
            flex-direction: column;
            align-items: flex-start;
        }
        .match-actions {
            text-align: right;
            margin-top: 10px;
        }
    }
</style>
</head>
<body><header>
    <h1>YariLiga - یاری لیگا</h1>
    <nav>
        <a href="#home">ماڵەوە</a>
        <a href="#leaderboard">سەرپەرشتی</a>
        <a href="#account">هەژمار</a>
    </nav>
</header><div class="container" id="home">
    <div class="league-select">
        <label for="league">هەڵبژاردنی لیگ:</label>
        <select id="league">
            <option>Premier League - ئینگلیز</option>
            <option>La Liga - ئیسپانیا</option>
            <option>Serie A - ئیتالیا</option>
            <option>Bundesliga - ئەڵمانیا</option>
            <option>Ligue 1 - فەرەنسا</option>
            <option>Eredivisie - هۆڵەندا</option>
            <option>Primeira Liga - پورتوگال</option>
            <option>Süper Lig - تورکیا</option>
            <option>Saudi Pro League - سعودی</option>
            <option>Qatar Stars League - قەتەر</option>
            <option>Belgian Pro League - بەلجیکا</option>
            <option>MLS - ئەمریکا</option>
            <option>Campeonato Brasileiro - برازیل</option>
            <option>Argentine Primera División - ئەرجەنتین</option>
            <option>UEFA Champions League - ئەورووپا</option>
            <option>Iraqi Premier League - عێراق</option>
        </select>
    </div><div class="match-card">
    <div class="match-info">
        <h3>Team A vs Team B</h3>
        <p>2026-03-03 18:00</p>
    </div>
    <div class="match-actions">
        <button onclick="openModal()">پێشبینی بکە</button>
    </div>
</div>

<div class="match-card">
    <div class="match-info">
        <h3>Team C vs Team D</h3>
        <p>2026-03-03 20:00</p>
    </div>
    <div class="match-actions">
        <button onclick="openModal()">پێشبینی بکە</button>
    </div>
</div>

</div><!-- Modal --><div class="modal" id="predictionModal">
    <div class="modal-content">
        <h2>پێشبینی</h2>
        <button class="prediction-btn">بردنەوەی تیمی ماڵەوە</button>
        <button class="prediction-btn">بردنەوەی تیمی میوان</button>
        <button class="prediction-btn">یەکسان بوونی هەردوو تیم</button>
        <button class="prediction-btn">بردنەوە + یەکسان - تیم ماڵەوە</button>
        <button class="prediction-btn">بردنەوە + یەکسان - تیم میوان</button>
        <button class="prediction-btn">بردنەوەی تیمی ماڵ یان میوان</button>
        <button class="prediction-btn">هەردوو تیم گۆل دەکەن</button>
        <button class="prediction-btn">گۆل > 0.5</button>
        <button class="prediction-btn">گۆل > 1.5</button>
        <button class="prediction-btn">گۆل > 2.5</button>
        <button class="prediction-btn">گۆل > 3.5</button>
        <button class="prediction-btn">گۆل > 4.5</button>
        <button class="prediction-btn">گۆل > 5.5</button>
        <button class="prediction-btn">گۆل > 6.5</button>
        <button onclick="closeModal()">داخستن</button>
    </div>
</div><div class="container leaderboard" id="leaderboard">
    <h2>سەرپەرشتی</h2>
    <ul>
        <li><span>1. User1</span> <span>120 pts</span></li>
        <li><span>2. User2</span> <span>115 pts</span></li>
        <li><span>3. User3</span> <span>110 pts</span></li>
    </ul>
</div><div class="container" id="account">
    <h2>هەژمارەکەم</h2>
    <p>Username: user123</p>
    <p>Coins: 7</p>
    <p>Prediction History: 10 Matches</p>
</div><script>
function openModal() {
    document.getElementById('predictionModal').style.display = 'flex';
}
function closeModal() {
    document.getElementById('predictionModal').style.display = 'none';
}
</script></body>
</html>
